# ==========================================================
# Social Network: Twitter (X)
# ==========================================================
# Configuration for the '/twitter' command and its behavior.
# This file controls how players interact with your Twitter/X profile links.
# 
# Support: https://discord.gg/Yb6GsfGWmd
# ==========================================================

twitter:
  # Global toggle for this specific social network.
  enabled: true

  # Toggle to control if a dynamic command (e.g., /twitter) is registered.
  register-command: true

  # The primary command registered for this social network (without the slash).
  command: twitter
  
  # ----------------------------------------------------------
  # Aliases & Permissions
  # ----------------------------------------------------------
  # Alternative commands to trigger this social network.
  aliases:
    - x
    - tweet
  
  # Permission node required. Leave empty for public access.
  permission: ""
  
  # ----------------------------------------------------------
  # Main Connection
  # ----------------------------------------------------------
  # The external URL for your Twitter/X profile.
  link: https://x.com/your-profile

  # ----------------------------------------------------------
  # GUI Icon Appearance
  # ----------------------------------------------------------
  # Defines how this social network looks in the management/editor GUI (/xs).
  gui-item:
    # Use BLOCK or HEAD.
    type: BLOCK
    # Material name or Player Name/Base64.
    material: CYAN_DYE
  
  # ----------------------------------------------------------
  # Interactive Chat Features
  # ----------------------------------------------------------
  # Hover text for the link in chat.
  hover: "&b&lCLICK! &7Follow us on Twitter for updates."
  
  # Detailed message sequence. Supports {link} and {player}.
  message:
    - "&8&m                                                  "
    - ""
    - "&b&l    TWITTER (X)"
    - ""
    - "&7Follow our profile to see snapshots of upcoming"
    - "&7updates and community highlights!"
    - ""
    - "&eLink: &f{link}"
    - ""
    - "&8&m                                                  "

  # ----------------------------------------------------------
  # Automated Rewards
  # ----------------------------------------------------------
  # Rewards granted on the first click.
  rewards:
    commands:
      - "eco give {player} 100"
      - "msg {player} &aThanks for checking our Twitter!"
