# ==========================================================
# Social Network Template
# ==========================================================
# This is a base template used by the plugin to ensure all
# social network files have the latest settings.
# ==========================================================

template:
  # Global toggle for this social network.
  enabled: true

  # Toggle to control if a dynamic command is registered.
  register-command: true

  # The primary command (e.g., custom).
  command: custom

  # Aliases for the command.
  aliases:
    - example

  # Permission node.
  permission: ""

  # External link.
  link: https://example.com

  # GUI appearance.
  gui-item:
    type: BLOCK
    material: PAPER

  # Chat hover text.
  hover: "&eClick here!"

  # Messages sent on use.
  message:
    - "&eYou are visiting our &bCustom &enetwork!"
    - "&eLink: &f{link}"

  # First-visit rewards.
  rewards:
    commands: []

  # Cooldown (in seconds). Set to 0 to disable.
  cooldown:
    seconds: 0

  # Sound effect on use. Set to "none" to disable.
  sound:
    name: ""
    volume: 1.0
    pitch: 1.0

  # Title on use. Set enable to false to disable.
  title:
    enable: false
    title: "&b{social}"
    subtitle: "&7Click to visit!"